version: "3.9"

services:

  backend-api:
    build: ./backend

    container_name: aetheros-backend

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  celery-worker:
    build: ./backend

    container_name: aetheros-worker

    command: celery -A app.core.celery_app.celery_app worker --loglevel=info

    volumes:
      - ./backend:/app

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16

    container_name: aetheros-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aetheros

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: aetheros-redis

    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus

    container_name: aetheros-prometheus

    volumes:
      - ./infrastructure/observability/prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

    depends_on:
      - backend-api

  grafana:
    image: grafana/grafana

    container_name: aetheros-grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

volumes:
  postgres_data: