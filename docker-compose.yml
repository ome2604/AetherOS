version: "3.9"

services:

  backend-api:
    build: ./backend
    container_name: aetheros-backend

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  celery-worker:
    build: ./backend
    container_name: aetheros-worker

    command: celery -A app.core.celery_app.celery_app worker --loglevel=info

    volumes:
      - ./backend:/app

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: aetheros-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aetheros

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aetheros-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: